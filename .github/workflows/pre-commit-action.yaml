name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  SKIP: ${{ github.ref == 'refs/heads/main' && 'no-commit-to-branch' || '' }}

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - run: uv sync
    - uses: pre-commit/action@v3.0.1
  testing:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - run: uv sync
    - run: make test
